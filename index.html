<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="埼玉県への移住をサポートするナビゲーションサイト">
  <title>住むなら埼玉</title>
  <link rel="stylesheet" href="assets/css/sanitize.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="inner">
      <p class="site-logo">住むなら埼玉</p>
      <nav class="gnav">
        <ul class="gnav-list">
          <li class="gnav-item"><a href="#about">埼玉について</a></li>
          <li class="gnav-item"><a href="#support">移住支援</a></li>
          <li class="gnav-item"><a href="#chat">相談する</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <section class="hero" id="about">
      <div class="inner">
        <h1 class="hero-title">埼玉で、新しい暮らしを。</h1>
        <p class="hero-lead">都心へのアクセスも、自然も、子育て環境も。<br>あなたにあった暮らしが埼玉にあります。</p>
        <a href="#chat" class="button">移住について相談する</a>
      </div>
    </section>

    <section class="support" id="support">
      <div class="inner">
        <h2 class="section-title">移住支援情報</h2>
        <p class="section-lead">埼玉県の移住支援制度や補助金情報をご紹介します。</p>
      </div>
    </section>

    <section class="chat-section" id="chat">
      <div class="inner">
        <h2 class="section-title">AIチャットで相談する</h2>
        <p class="section-lead">移住に関するご質問に、AIがお答えします。（近日公開）</p>
        <div class="chatbot-area" aria-label="チャットボットエリア">
          <!-- チャットボット実装予定 -->
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="inner">
      <p class="copyright">&copy; 埼玉県移住者ナビ</p>
    </div>
  </footer>

  <script src="assets/js/plugins.js"></script>
  <script src="assets/js/script.js"></script>

</body>
</html>
